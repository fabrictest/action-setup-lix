name: Repository Settings
on:
  push:
    branches:
      - main
    paths:
      - .github/settings.yaml
  schedule:
    - cron: "33 01 * * *"
jobs:
  apply:
    name: Apply
    runs-on: ubuntu-24.04
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@c1a285145b9d317df6ced56c09f525b5c2b6f755 # v1.11.1
        with:
          app-id: ${{ vars.REPOSITORY_SETTINGS_APP_ID }}
          private-key: ${{ secrets.REPOSITORY_SETTINGS_PRIVATE_KEY }}
      - name: Apply repository settings
        uses: mooseburgr/repository-settings-action@v0.1.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          settings-path: .github/settings.yaml
